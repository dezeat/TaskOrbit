<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Orbit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/htmx/1.9.6/htmx.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center min-h-screen py-8">
    <div class="container max-w-md">
        <h1 class="text-3xl font-bold text-center mb-8">Task Orbit</h1>
        
        <button class="w-full bg-blue-500 text-white py-2 rounded-lg mb-4 hover:bg-blue-600 transition duration-300"
                hx-get="/add_task_form" hx-target="#task-list" hx-swap="innerHTML">
            Add Task
        </button>
        
        <div class="flex justify-between mb-4">
            <input type="text" placeholder="Search tasks" class="w-2/3 p-2 border rounded-lg" 
                   hx-get="/search_tasks" hx-target="#task-list" hx-swap="innerHTML">
            <button class="bg-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300 transition duration-300"
                    hx-get="/filter_tasks" hx-target="#task-list" hx-swap="innerHTML">
                Filter
            </button>
        </div>
        
        <div class="container mx-auto p-4">
            <h2 class="text-2xl font-bold mb-4">Task List</h2>
            <div id="task-list" hx-get="/load_tasks" hx-trigger="load" hx-target="#task-list" hx-swap="innerHTML">
                <!-- Tasks will be loaded here -->
                <p class="text-gray-500">Loading tasks...</p>
            </div>
        </div>
    </div>
</body>
</html>
